app-id: cn.feishu.Feishu
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '25.08'
command: feishu
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  # For camera.
  - --device=all
  - --talk-name=org.gnome.ScreenSaver
  - --talk-name=org.freedesktop.Notifications
  # Share files.
  - --filesystem=xdg-download
separate-locales: false

modules:
  - name: feishu
    buildsystem: simple
    build-commands:
      - install -D -m 755 -t /app/bin/ apply_extra feishu
      - install -D -t /app/share/icons/hicolor/scalable/apps/ cn.feishu.Feishu.svg
      - install -D -t /app/share/applications/ cn.feishu.Feishu.desktop
      - install -D -t /app/share/metainfo/ cn.feishu.Feishu.metainfo.xml
    sources:
      - type: script
        commands:
          - export TMPDIR="$XDG_RUNTIME_DIR/app/$FLATPAK_ID"
          - source /app/extra/feishu/bytedance-feishu.sh
          - exec zypak-wrapper /app/extra/feishu/feishu "$@"
        dest-filename: feishu
      - type: script
        commands:
          - bsdtar -O -xf Feishu-linux.deb data.* | bsdtar --no-same-owner -xf -
          - mv opt/bytedance/feishu .
          - sed '/^exec -a/d' feishu/bytedance-feishu > feishu/bytedance-feishu.sh
          - rm -rf opt usr *.deb
        dest-filename: apply_extra
      - type: extra-data
        only-arches: [x86_64]
        filename: Feishu-linux.deb
        url: https://sf3-cn.feishucdn.com/obj/ee-appcenter/f63223d9/Feishu-linux_x64-7.62.9.deb
        sha256: f7a84e6002ac7ca699b6fbfe8e734290579e095bb0b9077048748f8390069883
        size: 436394288
        x-checker-data:
          type: json
          url: https://www.feishu.cn/api/downloads
          version-query: .versions.Linux_deb_x64.version_number | capture("@V(?<v>.*)")
            | .v
          url-query: .versions.Linux_deb_x64.download_link
      - type: extra-data
        only-arches: [aarch64]
        filename: Feishu-linux.deb
        url: https://sf3-cn.feishucdn.com/obj/ee-appcenter/d95df105/Feishu-linux_arm64-7.62.9.deb
        sha256: 8fe7c4b4977e8da1d5dcd07e31783c6a792ce85ddc77c57f4f3d8f707310b76a
        size: 393085616
        x-checker-data:
          type: json
          url: https://www.feishu.cn/api/downloads
          version-query: .versions.Linux_deb_arm.version_number | capture("@V(?<v>.*)")
            | .v
          url-query: .versions.Linux_deb_arm.download_link
      - type: file
        path: cn.feishu.Feishu.desktop
      - type: file
        path: cn.feishu.Feishu.metainfo.xml
      - type: file
        path: cn.feishu.Feishu.svg
